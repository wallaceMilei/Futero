<style>
  :root{--bg:#F5F0E8;--surface:#FAF6EF;--ink:#2A2520;--border:#E6DFD3;--terra:#B8543A;--green:#2A5A4A;--gold:#A87A2A;--muted:#8A8278;--red:#A04428;--lgreen:#DDE8D4;--lred:#F0D8CD;--lgold:#F3E6C9;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--ink);max-width:480px;margin:0 auto;padding-bottom:84px;min-height:100vh;}
  h1,h2,.serif{font-family:'Fraunces',serif;}
  input,select,button{font-family:inherit;font-size:16px;}
  input:focus,select:focus{outline:2px solid var(--terra);outline-offset:-1px;}
  .hdr{padding:20px 18px 12px;display:flex;justify-content:space-between;align-items:baseline;}
  .hdr h1{font-size:28px;font-weight:600;}
  .hdr .date{font-size:12px;color:var(--muted);}
  .wrap{padding:0 14px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
  .sec-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:10px;}
  .net-card{border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid var(--border);}
  .net-label{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;}
  .net-val{font-family:'Fraunces',serif;font-size:34px;font-weight:700;}
  .row{display:flex;justify-content:space-between;align-items:center;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
  .ministat{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 8px;text-align:center;}
  .ministat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;font-weight:700;}
  .ministat .v{font-family:'Fraunces',serif;font-size:14px;font-weight:600;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;}
  .stat .l{font-size:11px;color:var(--muted);}
  .stat .v{font-family:'Fraunces',serif;font-size:17px;font-weight:600;}
  .stat .s{font-size:10px;color:var(--muted);margin-top:1px;}
  .bar-row{margin-bottom:9px;}
  .bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;}
  .bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;}
  .tx{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  .tx .dot{width:8px;height:8px;border-radius:99px;flex-shrink:0;}
  .tx .info{flex:1;min-width:0;}
  .tx .ti{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tx .ts{font-size:11px;color:var(--muted);}
  .tx .amt{font-family:'Fraunces',serif;font-weight:600;}
  .tx .del{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:14px;}
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 10px;z-index:50;}
  .nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);cursor:pointer;padding:4px 6px;font-size:9.5px;font-weight:500;}
  .nav button.active{color:var(--terra);font-weight:700;}
  .nav .ic{font-size:19px;line-height:1;}
  .fabs{position:fixed;bottom:86px;left:0;right:0;max-width:480px;margin:0 auto;display:flex;gap:10px;padding:0 14px;justify-content:center;pointer-events:none;z-index:40;}
  .fab{flex:1;max-width:180px;display:flex;align-items:center;justify-content:center;gap:6px;color:#fff;border:none;border-radius:14px;padding:14px 0;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(42,37,32,.25);cursor:pointer;pointer-events:auto;}
  .btn{width:100%;padding:13px;color:#fff;border:none;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:10px;background:var(--ink);}
  .btn.green{background:var(--green);}
  .btn.ghost{background:var(--lgold);color:var(--ink);font-weight:600;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:5px;}
  .field input,.field select{width:100%;padding:11px 12px;font-size:15px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--ink);}
  .field input.big{padding:14px 12px;font-size:24px;font-weight:700;font-family:'Fraunces',serif;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .chip{padding:7px 11px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-weight:500;}
  .chip.sel{color:#fff;font-weight:700;}
  .chips.scroll{max-height:200px;overflow-y:auto;}
  .overlay{position:fixed;inset:0;background:rgba(42,37,32,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
  .sheet{background:var(--bg);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:18px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .sheet-hdr h2{font-size:22px;font-weight:600;}
  .sheet-hdr .x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:24px;}
  .month-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;}
  .month-tab{white-space:nowrap;padding:7px 13px;border-radius:20px;font-size:12.5px;cursor:pointer;flex-shrink:0;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-weight:500;}
  .month-tab.sel{background:var(--ink);color:#fff;font-weight:700;border-color:var(--ink);}
  .pill-btn{padding:9px;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;width:100%;}
  .quote{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--terra);border-radius:12px;padding:14px;margin-top:4px;}
  .quote p{font-family:'Fraunces',serif;font-style:italic;font-size:14px;line-height:1.5;}
  .empty{background:var(--surface);border:1px dashed var(--border);border-radius:14px;padding:28px;text-align:center;color:var(--muted);font-size:14px;}
  .note{margin-top:10px;padding:10px;background:var(--lgreen);color:var(--green);border-radius:9px;font-size:13px;font-weight:600;}
  .info-p{font-size:13px;line-height:1.6;color:#3A352F;}
  .login{padding:40px 24px;text-align:center;}
  .login h1{font-size:40px;margin-bottom:6px;}
  .login p{color:var(--muted);font-size:14px;margin-bottom:24px;}
  .spin{text-align:center;padding:60px 0;color:var(--muted);}
  .syncbadge{font-size:10px;color:var(--green);background:var(--lgreen);padding:2px 8px;border-radius:99px;font-weight:700;}
  .ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--terra);border-top:none;border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;z-index:20;box-shadow:0 8px 18px rgba(42,37,32,.18);}
  .ac-item{padding:11px 12px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);}
  .ac-item:last-child{border-bottom:none;}
  .ac-item:active,.ac-item.active{background:var(--lgold);}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:99px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity .25s,transform .25s;box-shadow:0 6px 20px rgba(42,37,32,.3);pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.green{background:var(--green);}
  .toast.red{background:var(--red);}
  .errbox{background:var(--lred);color:var(--red);padding:12px;border-radius:10px;font-size:13px;margin-bottom:12px;font-weight:600;}
</style>
</head>

function renderCatChips(category){

function wireAutocomplete(inputId, field){
  const input=document.getElementById(inputId); if(!input) return;
  const opts=uniqueVals(field);
  const holder=input.parentNode; holder.style.position='relative';
  const list=document.createElement('div'); list.className='ac-list'; list.style.display='none';
  holder.appendChild(list);
  function render(matches){
    if(!matches.length){list.style.display='none';return;}
    list.innerHTML=matches.slice(0,10).map(m=>'<div class="ac-item">'+esc(m)+'</div>').join('');
    list.style.display='block';
    list.querySelectorAll('.ac-item').forEach(it=>{
      it.addEventListener('mousedown',e=>{e.preventDefault();input.value=it.textContent;list.style.display='none';});
    });
  }
  function filter(){
    const q=input.value.trim().toLowerCase();
    if(!q){list.style.display='none';return;}
    render(opts.filter(o=>o.toLowerCase().includes(q)));
  }
  input.addEventListener('input',filter);
  input.addEventListener('focus',filter);
  input.addEventListener('blur',()=>{setTimeout(()=>{list.style.display='none';},150);});
}

async function init(){
  if(SUPABASE_URL.includes('PASTE_')||SUPABASE_KEY.includes('PASTE_')){
    document.getElementById('app').innerHTML='<div class="login"><h1>Futero</h1><p>Almost there. Open this file and paste your Supabase URL and key at the top of the script section, then reload.</p></div>';
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ state.user = session.user; await loadAll(); }
  else viewLogin();
}

function viewLogin(){
  document.getElementById('app').innerHTML =
    '<div class="login"><h1>Futero</h1><p>Sign in to sync across your phone and laptop.</p>'+
    '<div class="card" style="text-align:left;">'+
    '<div id="authErr"></div>'+
    '<div class="field"><label>Email</label><input type="email" id="au_email" placeholder="you@email.com"></div>'+
    '<div class="field"><label>Password</label><input type="password" id="au_pass" placeholder="at least 6 characters"></div>'+
    '<button class="btn" id="au_signin">Sign in</button>'+
    '<button class="btn ghost" id="au_signup">Create account</button>'+
    '</div></div>';
  document.getElementById('au_signin').onclick=()=>doAuth('in');
  document.getElementById('au_signup').onclick=()=>doAuth('up');
}

async function doAuth(mode){
  const email=document.getElementById('au_email').value.trim();
  const password=document.getElementById('au_pass').value;
  const errEl=document.getElementById('authErr');
  errEl.innerHTML='';
  if(!email||!password){errEl.innerHTML='<div class="errbox">Enter email and password.</div>';return;}
  let res;
  if(mode==='up') res=await sb.auth.signUp({email,password});
  else res=await sb.auth.signInWithPassword({email,password});
  if(res.error){errEl.innerHTML='<div class="errbox">'+esc(res.error.message)+'</div>';return;}
  if(mode==='up'&&!res.data.session){errEl.innerHTML='<div class="note">Account created. Now tap Sign in.</div>';return;}
  state.user=res.data.user||res.data.session.user;
  await loadAll();
}

async function signOut(){ await sb.auth.signOut(); state.user=null; viewLogin(); }

async function loadAll(){
  document.getElementById('app').innerHTML='<div class="spin">Syncing your data...</div>';
  try{
    const [tx,debts,goals,savings,settings,checklist,paydays] = await Promise.all([
      sb.from('transactions').select('*').order('date',{ascending:false}),
      sb.from('debts').select('*').order('remaining',{ascending:true}),
      sb.from('goals').select('*').order('created_at',{ascending:true}),
      sb.from('savings').select('*').order('date',{ascending:true}),
      sb.from('settings').select('*').limit(1),
      sb.from('checklist').select('*').order('sort_order',{ascending:true}),
      sb.from('paydays').select('*'),
    ]);
    state.tx = (tx.data||[]).map(fromDB);
    state.debts = debts.data||[];
    state.goals = goals.data||[];
    state.savings = savings.data||[];
    if(settings.data&&settings.data.length) state.settings = settings.data[0];
    state.checklist = checklist.data||[];
    state.paydays = {}; (paydays.data||[]).forEach(p=>{state.paydays[p.payday]=p;});
  }catch(e){ console.error(e); }
  buildShell();
  render();
}

async function addTx(entry){
  const row={date:entry.date,kind:entry.kind,amount:entry.amount,note:entry.note||''};
  if(entry.kind==='expense'){row.category=entry.category;row.paid_for=entry.paidFor||'';}
  else{row.source=entry.source;row.type=entry.type||'Other';}
  const {data,error}=await sb.from('transactions').insert(row).select();
  if(error){alert('Save failed: '+error.message);return;}
  state.tx.unshift(fromDB(data[0]));
}
async function delTx(id){
  await sb.from('transactions').delete().eq('id',id);
  state.tx=state.tx.filter(t=>t.id!==id);
}

// month start for current cycle (for bucket actuals)
function cycleMonth(){ return thisMonth(); }
// sum of real expenses logged in a category this month (for buckets)
function bucketActual(category, payday){
  // count expenses from when THIS payday's cycle started (resets on 'Start fresh')
  const cs=(state.paydays[payday]&&state.paydays[payday].cycle_started)||thisMonth()+'-01';
  return state.tx.filter(t=>t.kind==='expense'&&t.category===category&&(t.date||'')>=cs).reduce((s,t)=>s+Number(t.amount||0),0);
}
// linked expense id stored on the checklist row when a bill is ticked
async function tickBill(it, amount, date, desc){
  // create the expense
  const {data,error}=await sb.from('transactions').insert({date,kind:'expense',category:it.category||'Other',amount,paid_for:desc||it.name,note:''}).select();
  if(error){alert('Failed: '+error.message);return false;}
  state.tx.unshift(fromDB(data[0]));
  // mark done + store link
  await sb.from('checklist').update({done:true,linked_tx:data[0].id}).eq('id',it.id);
  it.done=true; it.linked_tx=data[0].id;
  return true;
}
async function untickBill(it){
  // delete the linked expense if present
  if(it.linked_tx){ await sb.from('transactions').delete().eq('id',it.linked_tx); state.tx=state.tx.filter(t=>t.id!==it.linked_tx); }
  await sb.from('checklist').update({done:false,linked_tx:null}).eq('id',it.id);
  it.done=false; it.linked_tx=null;
}
async function addChecklistItem(payday, name, amount){
  const order=state.checklist.filter(c=>c.payday===payday).length+100;
  const {data,error}=await sb.from('checklist').insert({payday,name,amount,kind:'flexible',is_extra:true,sort_order:order}).select();
  if(error){alert('Failed: '+error.message);return;}
  state.checklist.push(data[0]);
}
async function delChecklistItem(id){
  await sb.from('checklist').delete().eq('id',id);
  state.checklist=state.checklist.filter(c=>c.id!==id);
}
async function resetChecklist(payday){
  const ids=state.checklist.filter(c=>c.payday===payday&&c.done).map(c=>c.id);
  for(const id of ids){ await sb.from('checklist').update({done:false}).eq('id',id); }
  // also remove extras on reset
  const extras=state.checklist.filter(c=>c.payday===payday&&c.is_extra).map(c=>c.id);
  for(const id of extras){ await sb.from('checklist').delete().eq('id',id); }
  state.checklist.forEach(c=>{if(c.payday===payday)c.done=false;});
  state.checklist=state.checklist.filter(c=>!(c.payday===payday&&c.is_extra));
}
async function logPaydayIncome(payday, source, amount, type, date){
  const cycle=payday+'|'+((state.paydays[payday]&&state.paydays[payday].cycle_started)||today());
  // 1. income with cycle tag
  const {data:incData,error}=await sb.from('transactions').insert({date,kind:'income',source,type,amount,note:'',cycle}).select();
  if(error){alert('Failed: '+error.message);return null;}
  if(incData&&incData[0]){ const r=fromDB(incData[0]); r.cycle=cycle; state.tx.unshift(r); }
  // 2. auto 20% save
  const rate=Number(state.settings.savings_rate)||0.20;
  const saveAmt=Math.round(amount*rate);
  const {data:svData}=await sb.from('savings').insert({date,amount:saveAmt,source:source,note:'Auto '+Math.round(rate*100)+'% on '+source}).select();
  if(svData&&svData[0]){ state.savings.push(svData[0]); state.savings.sort((a,b)=>(a.date||'').localeCompare(b.date||'')); }
  return saveAmt;
}
async function startNewCycle(payday){
  const d=today();
  await sb.from('paydays').upsert({user_id:state.user.id,payday,cycle_started:d,updated_at:new Date().toISOString()});
  state.paydays[payday]={payday,cycle_started:d};
  // fresh checklist: untick + clear extras
  const its=state.checklist.filter(c=>c.payday===payday);
  for(const c of its){ if(c.done){ await sb.from('checklist').update({done:false,linked_tx:null}).eq('id',c.id); c.done=false; c.linked_tx=null; } }
  const extras=its.filter(c=>c.is_extra).map(c=>c.id);
  for(const id of extras){ await sb.from('checklist').delete().eq('id',id); }
  state.checklist=state.checklist.filter(c=>!(c.payday===payday&&c.is_extra));
}
// income belonging to current cycle of this payday
function cycleIncome(payday){
  const cs=(state.paydays[payday]&&state.paydays[payday].cycle_started);
  if(!cs) return [];
  const cycle=payday+'|'+cs;
  return state.tx.filter(t=>t.kind==='income'&&t.cycle===cycle).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
}
async function importSeed(){
  if(!confirm('This uploads your full April-June history ('+SEED.tx.length+' entries) to your account. Do this once. Continue?'))return;
  document.getElementById('app').innerHTML='<div class="spin">Uploading your history...</div>';
  // insert in batches
  const batches=[];
  for(let i=0;i<SEED.tx.length;i+=100) batches.push(SEED.tx.slice(i,i+100));
  for(const b of batches){ await sb.from('transactions').insert(b); }
  // debts/goals only if none exist
  if(state.debts.length===0) await sb.from('debts').insert(SEED.debts);
  if(state.goals.length===0) await sb.from('goals').insert(SEED.goals);
  await loadAll();
  toast('History uploaded','green');
}

function monthStats(m){

}

  if(!cycleInc.length)h+='<div style="font-size:13px;color:var(--muted);padding:4px 0 10px;">No money logged yet this cycle. Tap below when a cheque lands.</div>';
  else cycleInc.forEach(t=>{h+='<div class="tx"><div class="dot" style="background:var(--green)"></div><div class="info"><div class="ti">'+esc(t.source)+(t.type?' &middot; '+esc(t.type):'')+'</div><div class="ts">'+esc(t.date)+'</div></div><div class="amt" style="color:var(--green)">+'+fmt(t.amount)+'</div></div>';});
  h+='<button class="btn green" data-moneyin="'+sel+'" style="margin-top:10px;">+ Log money that came in</button>';
  h+='</div>';

  // summary - based on ACTUAL money received this cycle
  const rate=Number(state.settings.savings_rate)||0.20;
  const saved=Math.round(received*rate);
  const left=received-saved-total;
  h+='<div class="net-card" style="background:'+(left>=0?'var(--lgreen)':'var(--lred)')+'"><div class="net-label">'+sel+' cheque plan</div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px;"><span style="font-size:13px;color:var(--muted)">Received so far</span><span class="serif" style="font-size:16px;font-weight:600">'+fmt(received)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:baseline;"><span style="font-size:13px;color:var(--muted)">Saved ('+Math.round(rate*100)+'%)</span><span style="font-weight:600;color:var(--green)">-'+fmt(saved)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:baseline;"><span style="font-size:13px;color:var(--muted)">This list needs</span><span style="font-weight:600">-'+fmt(total)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--border);margin-top:6px;padding-top:6px;"><span style="font-weight:700">'+(left>=0?'Cushion left':'Short by')+'</span><span class="serif" style="font-size:18px;font-weight:700;color:'+(left>=0?'var(--green)':'var(--red)')+'">'+fmt(Math.abs(left))+'</span></div></div>';

  // progress
  h+='<div class="card"><div class="row" style="margin-bottom:8px;"><span class="sec-title" style="margin:0;">Paid '+done.length+' of '+items.length+'</span><span style="font-weight:700;font-size:13px;">'+fmt(doneTotal)+' / '+fmt(total)+'</span></div>';
  const pct=total>0?doneTotal/total*100:0;
  h+='<div class="bar-track" style="height:8px;"><div class="bar-fill" style="width:'+pct+'%;background:var(--green);height:100%"></div></div></div>';

  // the checklist - bills are tickable, buckets show budget vs actual
  const bills=items.filter(c=>(c.item_type||'bill')==='bill');
  const buckets=items.filter(c=>c.item_type==='bucket');

  h+='<div class="card"><div class="sec-title">Bills &middot; tick to pay &amp; log</div>';
  bills.forEach(c=>{
    h+='<div class="row" data-bill="'+c.id+'" style="padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:center;">';
    h+='<div style="display:flex;align-items:center;gap:11px;flex:1;min-width:0;">';
    h+='<div style="width:22px;height:22px;border-radius:6px;border:2px solid '+(c.done?'var(--green)':'var(--border)')+';background:'+(c.done?'var(--green)':'transparent')+';flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;">'+(c.done?'\u2713':'')+'</div>';
    h+='<div style="min-width:0;"><div style="font-size:14px;font-weight:500;'+(c.done?'text-decoration:line-through;color:var(--muted);':'')+'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(c.name)+'</div>';
    h+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;">'+(c.is_extra?'extra':c.kind)+'</div></div></div>';
    h+='<div style="font-family:Fraunces,serif;font-weight:600;'+(c.done?'color:var(--muted);':'')+'">'+fmt(c.amount)+'</div>';
    h+='<button class="del" data-editamt="'+c.id+'" title="Change budgeted amount" style="margin-left:8px;color:var(--muted);">&#9998;</button>';
    if(c.is_extra)h+='<button class="del" data-delcheck="'+c.id+'" style="margin-left:4px;">&#128465;</button>';
    h+='</div>';
  });
  h+='</div>';

  if(buckets.length){
    h+='<div class="card"><div class="sec-title">Spending buckets &middot; budget vs actual</div>';
    h+='<div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;">These track what you actually spend (logged normally, like Naivas, bodas). Nothing double-counts.</div>';
    buckets.forEach(c=>{
      const actual=bucketActual(c.category, sel);
      const pct=c.amount>0?Math.min(100,actual/c.amount*100):0;
      const over=actual>c.amount;
      h+='<div class="bar-row"><div class="bar-top"><span>'+esc(c.name)+'</span><span style="font-weight:600;color:'+(over?'var(--red)':'var(--ink)')+'">'+fmt(actual)+' / '+fmt(c.amount)+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(over?'var(--red)':'var(--gold)')+'"></div></div>'+(over?'<div style="font-size:11px;color:var(--red);margin-top:2px;">Over budget by '+fmt(actual-c.amount)+'</div>':'')+'</div>';
    });
    h+='</div>';
  }

  // add extra + reset
  h+='<button class="btn ghost" data-addcheck="'+sel+'">+ Add something extra (flowers, gift, etc.)</button>';
  if(sel==='25th')h+='<div style="font-size:12px;color:var(--muted);padding:0 4px 10px;line-height:1.5;">Fixed bills: '+fmt(fixedTotal)+' &middot; Flexible (can trim): '+fmt(flexTotal)+'</div>';
  h+='<button class="btn" style="background:var(--gold);" data-newcycle="'+sel+'">Start fresh for next '+sel+' cheque</button>';
  return h;
}

function viewSavings(){
  const rate=Number(state.settings.savings_rate)||0.20;
  const months=Number(state.settings.emergency_months)||3;
  const totalIncome=state.tx.filter(t=>t.kind==='income').reduce((s,t)=>s+Number(t.amount||0),0);
  const shouldSave=totalIncome*rate;
  const actuallySaved=state.savings.reduce((s,d)=>s+Number(d.amount||0),0);
  const gap=shouldSave-actuallySaved;
  // avg monthly expenses
  const monthsSet=new Set(state.tx.filter(t=>t.kind==='expense').map(t=>(t.date||'').slice(0,7)).filter(Boolean));
  const totalExp=state.tx.filter(t=>t.kind==='expense').reduce((s,t)=>s+Number(t.amount||0),0);
  const avgMonthly=monthsSet.size?totalExp/monthsSet.size:0;
  const emTarget=avgMonthly*months;
  const emPct=emTarget>0?Math.min(100,actuallySaved/emTarget*100):0;
  const justGot=state._saveIncome||0;
  const setAside=justGot*rate;

  let h='';
  // Emergency fund hero
  h+='<div class="net-card" style="background:var(--lgreen)"><div class="net-label">Emergency fund</div><div class="net-val" style="color:var(--green)">'+fmt(actuallySaved)+'</div><div style="font-size:13px;color:var(--muted);margin-top:4px;">of '+fmt(emTarget)+' target ('+months+' months of expenses) &middot; '+Math.round(emPct)+'%</div><div class="bar-track" style="height:8px;margin-top:10px;"><div class="bar-fill" style="width:'+emPct+'%;background:var(--green);height:100%"></div></div></div>';

  // Saving discipline: should vs actual
  h+='<div class="card"><div class="sec-title">Are you on track? ('+Math.round(rate*100)+'% of income)</div>';
  h+='<div class="row" style="padding:6px 0;"><span style="font-size:13px;color:var(--muted)">Should have saved</span><span style="font-weight:600">'+fmt(shouldSave)+'</span></div>';
  h+='<div class="row" style="padding:6px 0;"><span style="font-size:13px;color:var(--muted)">Actually saved</span><span style="font-weight:600;color:var(--green)">'+fmt(actuallySaved)+'</span></div>';
  h+='<div class="row" style="padding:8px 0 2px;border-top:1px solid var(--border);"><span style="font-weight:700">'+(gap>0?'Behind by':'Ahead by')+'</span><span class="serif" style="font-size:18px;font-weight:700;color:'+(gap>0?'var(--red)':'var(--green)')+'">'+fmt(Math.abs(gap))+'</span></div>';
  if(gap>0)h+='<div style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5;">Catch up when your next payment comes in.</div>';
  h+='</div>';

  // When income arrives calculator
  h+='<div class="card"><div class="sec-title">Next payment? Save this first</div>';
  h+='<div class="field"><label>If you receive (KSh)</label><input class="big" type="number" inputmode="decimal" id="saveIncome" value="'+(justGot||'')+'" placeholder="0"></div>';
  h+='<div id="save_result"><div class="row" style="padding:8px 0 2px;"><span style="font-weight:700">Move to savings now</span><span class="serif" style="font-size:20px;font-weight:700;color:var(--green)">'+fmt(setAside)+'</span></div><div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;">Set this aside BEFORE you spend anything.</div></div>';
  h+='</div>';

  // Deposit log
  h+='<div class="card"><div class="sec-title">Savings deposits</div>';
  h+='<button class="btn green" data-addsaving="1" style="margin-bottom:12px;">+ Log a savings deposit</button>';
  if(!state.savings.length)h+='<div style="color:var(--muted);font-size:14px;text-align:center;padding:10px;">No deposits logged yet.</div>';
  else{
    const sorted=state.savings.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    sorted.forEach(d=>{h+='<div class="tx" data-opensaving="'+d.id+'" style="cursor:pointer;"><div class="dot" style="background:var(--green)"></div><div class="info"><div class="ti">'+fmt(d.amount)+(d.source?' &middot; '+esc(d.source):'')+'</div><div class="ts">'+esc(d.date)+(d.note?' &middot; '+esc(d.note):'')+'</div></div><span style="color:var(--muted);font-size:16px;">&#8250;</span></div>';});
  }
  h+='</div>';

  // Settings
  h+='<div class="card"><div class="sec-title">Settings</div>';
  h+='<div class="field"><label>Savings rate (% of income)</label><input type="number" inputmode="decimal" id="set_rate" value="'+Math.round(rate*100)+'"></div>';
  h+='<div class="field"><label>Emergency fund: months of expenses</label><input type="number" inputmode="decimal" id="set_months" value="'+months+'"></div>';
  h+='<button class="btn" data-savesettings="1">Save settings</button></div>';
  return h;
}

function openCatDetail(category, month){
  const items=state.tx.filter(t=>t.kind==='expense'&&t.category===category&&(!month||(t.date||'').startsWith(month))).sort((a,b)=>b.amount-a.amount);
  const total=items.reduce((s,t)=>s+Number(t.amount||0),0);
  const mlabel=month?(()=>{const[y,mo]=month.split('-');return new Date(+y,+mo-1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});})():'All time';
  let h='<div class="overlay" data-close="1"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-hdr"><h2>'+esc(category)+'</h2><button class="x" data-close="1">X</button></div>';
  h+='<div class="net-card" style="background:var(--lred);margin-bottom:14px;"><div class="net-label">'+esc(mlabel)+' &middot; '+items.length+' entries</div><div class="net-val" style="font-size:30px;color:var(--red)">'+fmt(total)+'</div></div>';
  // group by who/what (paidFor) - THIS is the main view: where the money went
  const whoMap={}; const whoCount={};
  items.forEach(t=>{const w=(t.paidFor||'').trim()||'(no description)';whoMap[w]=(whoMap[w]||0)+Number(t.amount||0);whoCount[w]=(whoCount[w]||0)+1;});
  const byWho=Object.entries(whoMap).map(([n,a])=>({n,a,c:whoCount[n]})).sort((x,y)=>y.a-x.a);
  h+='<div class="card"><div class="sec-title">Where the money went</div>';
  if(!byWho.length)h+='<div style="color:var(--muted);font-size:14px;padding:10px;">Nothing here.</div>';
  else{
    const mx=byWho[0].a;
    byWho.forEach(w=>{
      const pct=total>0?Math.round(w.a/total*100):0;
      h+='<div class="bar-row"><div class="bar-top"><span>'+esc(w.n)+(w.c>1?' <span style="color:var(--muted);font-weight:400">&times;'+w.c+'</span>':'')+'</span><span style="font-weight:600">'+fmt(w.a)+' <span style="color:var(--muted);font-weight:400;font-size:11px">'+pct+'%</span></span></div><div class="bar-track"><div class="bar-fill" style="width:'+(w.a/mx*100)+'%;background:var(--gold)"></div></div></div>';
    });
  }
  h+='</div>';
  // full chronological list below
  h+='<div class="card"><div class="sec-title">Every entry, by date</div>';
  if(!items.length)h+='<div style="color:var(--muted);font-size:14px;padding:10px;">Nothing here.</div>';
  items.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(t=>{h+='<div class="tx"><div class="info"><div class="ti">'+esc(t.paidFor||'(no description)')+'</div><div class="ts">'+esc(t.date)+(t.note?' &middot; '+esc(t.note):'')+'</div></div><div class="amt">'+fmt(t.amount)+'</div></div>';});
  h+='</div></div></div>';
  showModal(h);
}

  showModal(h);
  wireAutocomplete('mi_src','source');
  document.querySelectorAll('#mi_types .chip').forEach(ch=>ch.onclick=()=>{document.querySelectorAll('#mi_types .chip').forEach(x=>{x.classList.remove('sel');x.style.background='';x.style.color='';});ch.classList.add('sel');ch.style.background='var(--green)';ch.style.color='#fff';state._mi.type=ch.dataset.type;});
  const amtEl=document.getElementById('mi_amt');
  amtEl.oninput=()=>{const a=+amtEl.value||0;const rate=Number(state.settings.savings_rate)||0.20;const info=document.getElementById('mi_saveinfo');if(a>0){info.style.display='block';info.innerHTML='Will set aside <strong>'+fmt(Math.round(a*rate))+'</strong> ('+Math.round(rate*100)+'%) to savings automatically.';}else info.style.display='none';};
  document.getElementById('mi_save').onclick=async()=>{
    const amt=+amtEl.value, src=document.getElementById('mi_src').value.trim();
    if(!amt||!src){alert('Enter amount and who it came from');return;}
    const saved=await logPaydayIncome(payday, src, amt, state._mi.type, document.getElementById('mi_date').value);
    closeModal(); render();
    if(saved!=null) toast('Logged '+fmt(amt)+' \u00b7 saved '+fmt(saved),'green');
  };
}
function openBillTick(id){
  const it=state.checklist.find(x=>x.id===id); if(!it) return;
  if(it.done){ // untick -> remove linked expense
    if(!confirm('Untick '+it.name+'? This will also remove the expense it logged.'))return;
    untickBill(it).then(()=>{render();toast('Unticked');});
    return;
  }
  let h='<div class="overlay" data-close="1"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-hdr"><h2>Pay: '+esc(it.name)+'</h2><button class="x" data-close="1">X</button></div>';
  h+='<div class="field"><label>How much did you spend? (KSh)</label><input class="big" type="number" inputmode="decimal" id="bt_amt" value="'+it.amount+'"></div>';
  h+='<div class="field"><label>Who / what was this for?</label><input type="text" id="bt_desc" autocomplete="off" placeholder="e.g. SENT TO MZEE - RENT" value="'+esc(it.name)+'"></div>';
  h+='<div class="field"><label>Date</label><input type="date" id="bt_date" value="'+today()+'"></div>';
  h+='<button class="btn green" id="bt_save">Mark paid &amp; log expense</button></div></div>';
  showModal(h);
  wireAutocomplete('bt_desc','paidFor');
  document.getElementById('bt_save').onclick=async()=>{
    const amt=+document.getElementById('bt_amt').value;
    if(!amt){alert('Enter the amount');return;}
    const ok=await tickBill(it, amt, document.getElementById('bt_date').value, document.getElementById('bt_desc').value);
    if(ok){closeModal();render();toast('Paid & logged','green');}
  };
}
function openSavingDetail(id){
  const d=state.savings.find(x=>x.id===id); if(!d) return;
  let h='<div class="overlay" data-close="1"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-hdr"><h2>Savings deposit</h2><button class="x" data-close="1">X</button></div>';
  h+='<div class="net-card" style="background:var(--lgreen);margin-bottom:16px;"><div class="net-val" style="font-size:30px;color:var(--green)">'+fmt(d.amount)+'</div></div>';
  h+='<div class="card"><div class="row" style="padding:6px 0;"><span style="color:var(--muted);font-size:13px;">Date</span><span style="font-weight:600;">'+esc(d.date)+'</span></div>';
  if(d.source)h+='<div class="row" style="padding:6px 0;"><span style="color:var(--muted);font-size:13px;">Source</span><span style="font-weight:600;">'+esc(d.source)+'</span></div>';
  if(d.note)h+='<div class="row" style="padding:6px 0;"><span style="color:var(--muted);font-size:13px;">Note</span><span style="font-weight:600;">'+esc(d.note)+'</span></div></div>';
  h+='<button class="btn" style="background:var(--red);" id="sv_del">Delete this deposit</button></div></div>';
  showModal(h);
  document.getElementById('sv_del').onclick=async()=>{if(!confirm('Delete this savings deposit of '+fmt(d.amount)+'? This cannot be undone.'))return;await delSaving(id);closeModal();render();toast('Deposit deleted');};
}
function showModal(h){document.getElementById('modal').innerHTML=h;document.querySelectorAll('[data-close]').forEach(el=>el.onclick=e=>{if(e.target===el)closeModal();});}
function closeModal(){document.getElementById('modal').innerHTML='';}

function exportCSV(){const rows=[['Date','Kind','Category/Source','Amount','Type','Who For','Note']];state.tx.forEach(t=>rows.push([t.date,t.kind,t.category||t.source||'',t.amount,t.type||'',t.paidFor||'',t.note||'']));const csv=rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='futero_'+today()+'.csv';a.click();URL.revokeObjectURL(url);toast('CSV exported','green');}

function updateAlloc(){
  const r=document.getElementById('alloc_results'); if(r)r.innerHTML=allocResultsHTML();
  const s=document.getElementById('alloc_split'); if(s)s.innerHTML=allocSplitHTML();
}
function bindEvents(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render();});
  document.querySelectorAll('[data-sheet]').forEach(b=>b.onclick=()=>{b.dataset.sheet==='expense'?openExpense():openIncome();});
  document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openTxDetail(b.dataset.open));
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>openCatDetail(b.dataset.cat,b.dataset.catmonth));
  const si=document.getElementById('saveIncome');if(si)si.oninput=()=>{state._saveIncome=+si.value||0;const r=document.getElementById('save_result');if(r){const rate=Number(state.settings.savings_rate)||0.20;const sa=(state._saveIncome||0)*rate;r.innerHTML='<div class="row" style="padding:8px 0 2px;"><span style="font-weight:700">Move to savings now</span><span class="serif" style="font-size:20px;font-weight:700;color:var(--green)">'+fmt(sa)+'</span></div><div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;">Set this aside BEFORE you spend anything.</div>';}};
  const as=document.querySelector('[data-addsaving]');if(as)as.onclick=async()=>{const amt=prompt('How much did you save (KSh)?');if(!amt||isNaN(amt))return;const src=prompt('Source? (e.g. WORK)')||'';await addSaving({date:today(),amount:+amt,source:src,note:''});render();toast('Saved '+fmt(+amt),'green');};
  document.querySelectorAll('[data-opensaving]').forEach(b=>b.onclick=()=>openSavingDetail(b.dataset.opensaving));
  const ssv=document.querySelector('[data-savesettings]');if(ssv)ssv.onclick=async()=>{const rate=(+document.getElementById('set_rate').value||20)/100;const months=+document.getElementById('set_months').value||3;await saveSettings({savings_rate:rate,emergency_months:months});render();toast('Settings saved','green');};
  document.querySelectorAll('[data-payday]').forEach(b=>b.onclick=()=>{state.paydaySel=b.dataset.payday;render();});
  const mi=document.querySelector('[data-moneyin]');if(mi)mi.onclick=()=>openMoneyIn(mi.dataset.moneyin);
  const nc=document.querySelector('[data-newcycle]');if(nc)nc.onclick=async()=>{if(!confirm('Start a fresh '+nc.dataset.newcycle+' cycle? This unticks the checklist and clears extras. Your logged income and expenses stay in Reports.'))return;await startNewCycle(nc.dataset.newcycle);render();toast('New cycle started','green');};
  document.querySelectorAll('[data-bill]').forEach(b=>b.onclick=(e)=>{if(e.target.closest('[data-delcheck]')||e.target.closest('[data-editamt]'))return;openBillTick(b.dataset.bill);});
  document.querySelectorAll('[data-editamt]').forEach(b=>b.onclick=async(e)=>{e.stopPropagation();const it=state.checklist.find(x=>x.id===b.dataset.editamt);const v=prompt('New budgeted amount for '+it.name+' (KSh)?',it.amount);if(v===null||isNaN(v))return;await updateChecklistAmount(it.id,+v);render();toast('Budget updated','green');});
  document.querySelectorAll('[data-delcheck]').forEach(b=>b.onclick=async(e)=>{e.stopPropagation();await delChecklistItem(b.dataset.delcheck);render();toast('Removed');});
  const ac=document.querySelector('[data-addcheck]');if(ac)ac.onclick=async()=>{const name=prompt('What is it? (e.g. Flowers)');if(!name)return;const amt=prompt('Amount (KSh)?');if(!amt||isNaN(amt))return;await addChecklistItem(ac.dataset.addcheck,name,+amt);render();toast('Added to list','green');};
  const rc=document.querySelector('[data-resetcheck]');if(rc)rc.onclick=async()=>{if(!confirm('Start fresh? This unticks everything and removes extra items for the next '+rc.dataset.resetcheck+' cheque.'))return;await resetChecklist(rc.dataset.resetcheck);render();toast('Fresh start ready','green');};
  document.querySelectorAll('[data-month]').forEach(b=>b.onclick=()=>{state.dashMonth=b.dataset.month;render();});
  document.querySelectorAll('[data-paydebt]').forEach(b=>b.onclick=async()=>{const amt=prompt('Payment amount (KSh)?');if(!amt||isNaN(amt))return;const d=state.debts.find(x=>x.id===b.dataset.paydebt);await updDebt(d.id,{remaining:Math.max(0,d.remaining-(+amt))});render();toast('Payment logged','green');});
  document.querySelectorAll('[data-addgoal]').forEach(b=>b.onclick=async()=>{const amt=prompt('Add how much (KSh)?');if(!amt||isNaN(amt))return;const g=state.goals.find(x=>x.id===b.dataset.addgoal);await updGoal(g.id,{saved:Number(g.saved)+(+amt)});render();toast('Added to goal','green');});
  const ex=document.querySelector('[data-export]');if(ex)ex.onclick=exportCSV;
  const im=document.querySelector('[data-import]');if(im)im.onclick=importSeed;
  const so=document.querySelector('[data-signout]');if(so)so.onclick=signOut;
  const aa=document.getElementById('allocAmt');if(aa)aa.oninput=()=>{state._allocAmt=+aa.value||0;updateAlloc();};
  const aw=document.getElementById('allocWork');if(aw)aw.oninput=()=>{state._allocWork=+aw.value||0;updateAlloc();};
  const ad=document.querySelector('[data-adddebt]');if(ad)ad.onclick=async()=>{const name=prompt('Who do you owe?');if(!name)return;const rem=prompt('Amount (KSh)?');if(!rem||isNaN(rem))return;await addDebt({name,remaining:+rem,type:'Family',pressure:'Medium'});render();toast('Debt added');};
  const ng=document.querySelector('[data-newgoal]');if(ng)ng.onclick=async()=>{const name=prompt('Goal name?');if(!name)return;const tg=prompt('Target (KSh)?');if(!tg||isNaN(tg))return;const sv=prompt('Already saved? (0 if none)')||0;await addGoal({name,target:+tg,saved:+sv||0});render();toast('Goal added');};
}

init();
</script>
</body>
</html>
